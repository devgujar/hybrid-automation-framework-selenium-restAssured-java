# ---- QA environment (UI / Selenium) ----
env=qa

# UI application under test (sample target)
ui.base.url=https://www.saucedemo.com
ui.default.userName=standard_user
ui.default.password=secret_sauce


# Browser / WebDriver
ui.browser=chrome
ui.headless=false
ui.implicit.wait.seconds=10
ui.page.load.timeout.seconds=30
ui.explicit.wait.seconds=15

# Selenium Grid (set grid.enabled=true to run remotely)
ui.grid.enabled=false
ui.grid.url=http://localhost:4444/wd/hub

# Retry flaky tests
ui.retry.count=1

# ---- AI failure analysis (OpenAI-compatible Chat Completions API) ----
# Disabled by default. Enable to get an AI-generated failure summary embedded in
# the Extent report on test failure.
# Local runs: paste your key into ai.api.key below.
# CI runs: leave ai.api.key empty and pass it at runtime from a secret store, e.g.
#   -Dai.api.key=${{ secrets.GROQ_API_KEY }}   (the system property overrides this file)
ai.failure.analysis.enabled=true
ai.api.url=https://api.groq.com/openai/v1/chat/completions
ai.model=llama-3.3-70b-versatile
ai.api.key=
ai.timeout.seconds=30
ai.max.stacktrace.chars=4000
# Max characters of the failing test's source sent to the model so it can suggest a fix (0 to disable).
ai.max.source.chars=6000
# POC/local ONLY: set true to bypass TLS cert validation (e.g. corporate proxy MITM).
# Never enable in shared or CI environments — it disables MITM protection.
ai.tls.insecure=false
