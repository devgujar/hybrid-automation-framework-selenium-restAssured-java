# ---- QA environment (UI / Selenium) ----
env=qa

# UI application under test (sample target)
ui.base.url=https://www.saucedemo.com
ui.default.userName=standard_user
ui.default.password=secret_sauce


# Browser / WebDriver
ui.browser=chrome
ui.headless=false
ui.implicit.wait.seconds=10
ui.page.load.timeout.seconds=30
ui.explicit.wait.seconds=15

# Selenium Grid (set grid.enabled=true to run remotely)
ui.grid.enabled=false
ui.grid.url=http://localhost:4444/wd/hub

# Retry flaky tests
ui.retry.count=1

