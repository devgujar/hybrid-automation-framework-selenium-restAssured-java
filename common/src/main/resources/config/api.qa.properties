# ---- QA environment (API / RestAssured) ----

# Mirrors the API module base URI so hybrid tests share one endpoint.
api.base.uri = https://restapi.devgujar.workers.dev

# to disable SSL set this to true
api.ssl.relaxed = true



# set logging true for local debugging
api.enable.logging=false

api.http.connect.timeout.ms=12000
api.http.read.timeout.ms=30000


# Authentications - NONE, BASIC, BEARER, OAUTH2, API_KEY
api.auth.type=NONE

# Authentications - Additional configurations
api.auth.username=
api.auth.password=
api.auth.token=
api.auth.oauth.token=
api.auth.header.name=
api.auth.header.value=