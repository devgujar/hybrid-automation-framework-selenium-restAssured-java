# =====================================================================
# Common, reusable XPath templates.
# Placeholders (%s) are filled IN ORDER by common.utility / ui.support.XPathStore.
# Keep only generic, parameterised shapes here - NOT page-specific locators.
# =====================================================================

# value  ->  //input[contains(@id,'value')]
INPUT_BY_ID = //input[contains(@id,'%s')]
BUTTON_BY_ID = //button[contains(@id,'%s')]

# tag, attribute, value  ->  //tag[contains(@attribute,'value')]
ELEMENT_BY_TAG_ATTRIBUTE = //%s[contains(@%s,'%s')]

# value  ->  //*[contains(@id,'value')]
ELEMENT_BY_ID = //*[contains(@id,'%s')]

# value  ->  //*[contains(@id,'value')]
ELEMENT_BY_CLASS = //*[contains(@class,'%s')]

# tag, text  ->  //tag[contains(text(),'text')]
ELEMENT_BY_TAG_TEXT = //%s[contains(text(),'%s')]


# BASE TEST XPATH
TEXT_ON_PAGE=//*[normalize-space(.)='%s']


# PRODUCT PAGE XPATH
BUTTON_ADD_OR_REMOVE_FROM_CART=//div[text()='%s']/../../..//button[text()='%s']

