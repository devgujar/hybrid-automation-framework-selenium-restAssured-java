name: Hybrid Automation CI
on:
  schedule:
    - cron: '0 21 * * 5'
  workflow_dispatch:

  #push:
    #branches: [ main, master ]
  #pull_request:
    #branches: [ main, master ]
    inputs:
      layer:
        description: "Which layer to run"
        required: true
        default: "all"
        type: choice
        options: [ all, api, ui, hybrid ]
      env:
        description: "Target environment"
        required: true
        default: "qa"
        type: choice
        options: [ qa, staging, prod ]

jobs:
  build:
    runs-on: ubuntu-latest
    # Needed so the workflow can push the regenerated dashboard back to the repo.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # Compile + install all modules so inter-module artifacts are available.
      - name: Build (no tests)
        run: mvn -B -DskipTests clean install

      # --- Layer-scoped test execution via module selection ---
      - name: API tests
        if: ${{ github.event.inputs.layer == 'api' || github.event.inputs.layer == 'all' || github.event_name != 'workflow_dispatch' }}
        run: mvn -B test -pl api-automation-framework -fae -Denv=${{ github.event.inputs.env || 'qa' }}
        continue-on-error: true
        
      - name: UI tests (headless)
        if: ${{ github.event.inputs.layer == 'ui' || github.event.inputs.layer == 'all' || github.event_name != 'workflow_dispatch' }}
        run: mvn -B test -pl ui-automation-framework -fae -Denv=${{ github.event.inputs.env || 'qa' }} -Dui.headless=true
        continue-on-error: true


      - name: Hybrid Module Build dependencies (skip tests)
        if: ${{ github.event.inputs.layer == 'hybrid' || github.event.inputs.layer == 'all' || github.event_name != 'workflow_dispatch' }}
        run: mvn -B install -pl integration-tests -am -DskipTests

      - name: Hybrid Module Run tests (headless)
        if: ${{ github.event.inputs.layer == 'hybrid' || github.event.inputs.layer == 'all' || github.event_name != 'workflow_dispatch' }}
        run: mvn -B test -pl integration-tests -fae -Denv=${{ github.event.inputs.env || 'qa' }} -Dui.headless=true
        continue-on-error: true

      # Aggregate per-module TestNG results + Extent reports into one dashboard (docs/reports/index.html).
      - name: Generate consolidated dashboard
        if: always()
        run: java scripts/DashboardGenerator.java . docs/reports

      # Persist the regenerated dashboard back into the repo (docs/ is the GitHub Pages source).
      # Skipped on pull requests (forks cannot push). '[skip ci]' prevents an infinite trigger loop.
      - name: Commit dashboard to repo
        if: ${{ always() && github.event_name != 'pull_request' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/reports
          if git diff --staged --quiet; then
            echo "No dashboard changes to commit."
          else
            git commit -m "chore(ci): update consolidated test dashboard [skip ci]"
            git push
          fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-reports
          path: |
            docs/reports/**
            **/target/extent-report.html
            **/target/screenshots/**
            **/target/logs/**
            **/target/surefire-reports/**
          if-no-files-found: ignore

      # Trigger a Cloudflare Pages deploy so the published dashboard reflects the latest run.
      # Skipped on pull requests; only runs when the deploy hook secret is configured.
      - name: Trigger Cloudflare Deploy
        if: ${{ always() && github.event_name != 'pull_request' && env.CF_DEPLOY_HOOK != '' }}
        env:
          CF_DEPLOY_HOOK: ${{ secrets.CF_DEPLOY_HOOK }}
        run: curl -X POST "$CF_DEPLOY_HOOK"

